name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          MONGODB_URI: "mongodb://localhost:27017"
          REDIS_URL: "redis://localhost:6379"
          OPENAI_API_KEY: "sk-dummy"
        run: |
          PYTHONPATH=Python pytest tests/ --cov=Python --cov-report=xml:coverage.xml --cov-config=.coveragerc -v

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92
        with:
          args: >
            -Dsonar.organization=mihir021
            -Dsonar.projectKey=mihir021_resume-maker-
            -Dsonar.sources=Python
            -Dsonar.tests=tests
            -Dsonar.python.version=3.11
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
