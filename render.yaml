# Render.com deploy config
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: resume-maker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: cd Python && gunicorn --bind 0.0.0.0:$PORT run:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
