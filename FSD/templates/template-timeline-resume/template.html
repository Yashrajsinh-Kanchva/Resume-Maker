<div class="resume timeline-pro" style="width:800px;min-height:1100px;">

  <!-- HEADER -->
  <header class="top-header">
    <h1 id="previewName">Resume</h1>
    <p id="previewTitle">Title </p>
  </header>

  <div class="body">

    <!-- LEFT PANEL -->
    <aside class="left-panel">

    <section class="side-section">
      <h3>CONTACT</h3>
      <p id="previewPhone"></p>
      <p id="previewEmail"></p>
      <p id="previewLocation"></p>
    </section>

    <section class="side-section" id="skillsSection">
      <h3>SKILLS</h3>
      <ul id="previewSkills"></ul>
    </section>

    <section class="side-section">
      <h3>LANGUAGES</h3>
      <ul id="pLanguages"></ul>
    </section>

    <!-- ✅ ADD THIS -->
    <section class="side-section">
      <h3>CERTIFICATIONS</h3>
      <ul id="pCerts"></ul>
    </section>

  </aside>


    <!-- RIGHT PANEL -->
    <main class="right-panel">

      <section class="main-section">
        <h3>SUMMARY</h3>
        <p id="previewSummary"></p>
      </section>

      <!-- EXPERIENCE TIMELINE -->
      <section class="main-section timeline" id="previewExperienceSection">
        <h3>EXPERIENCE</h3>
        <div id="previewExperienceList">
          <!-- .exp-item injected -->
        </div>
      </section>

      <!-- EDUCATION TIMELINE -->
      <section class="main-section timeline" id="educationSection">
        <h3>EDUCATION</h3>
        <div class="edu-item">
          <p id="previewDegree"></p>
          <p id="previewField"></p>
          <p id="previewEduInstitute"></p>
          <p id="previewEduLocation"></p>
          <p id="previewGraduation"></p>
          <ul id="previewEduDetails"></ul>
        </div>
      </section>

    </main>

  </div>
</div>
