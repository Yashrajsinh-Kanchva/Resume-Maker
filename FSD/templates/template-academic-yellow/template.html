<div class="resume academic-yellow">

  <!-- MODERN HEADER WITH YELLOW ACCENT -->
  <header class="top-header">
    <div class="header-content">
      <div class="header-left">
        <h1 id="previewName"></h1>
        <p id="previewTitle"></p>
      </div>
      <div class="header-right">
        <div class="contact-info">
          <div class="contact-item">
            <span class="contact-icon"></span>
            <span id="previewPhone"></span>
          </div>
          <div class="contact-item">
            <span class="contact-icon"></span>
            <span id="previewEmail"></span>
          </div>
          <div class="contact-item">
            <span class="contact-icon"></span>
            <span id="previewLocation"></span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="body">

    <!-- LEFT SIDEBAR - MODERN CARD DESIGN -->
    <aside class="left-panel">

        <div class="profile-icon">

      <!-- SKILLS SECTION -->
      <section class="side-section card-modern" id="skillsSection">
        <div class="section-header">
          <span class="section-icon"></span>
          <h3>SKILLS</h3>
        </div>
        <ul id="previewSkills" class="skills-grid"></ul>
      </section>

      <!-- LANGUAGES SECTION -->
      <section class="side-section card-modern">
        <div class="section-header">
          <span class="section-icon"></span>
          <h3>LANGUAGES</h3>
        </div>
        <ul id="pLanguages" class="languages-list"></ul>
      </section>

      <!-- CERTIFICATIONS SECTION -->
      <section class="side-section card-modern">
        <div class="section-header">
          <span class="section-icon"></span>
          <h3>CERTIFICATIONS</h3>
        </div>
        <ul id="pCerts" class="certs-list"></ul>
      </section>

    </aside>

    <!-- RIGHT CONTENT - MODERN LAYOUT -->
    <main class="right-panel">

      <!-- CAREER OBJECTIVE -->
      <section class="main-section card-content">
        <div class="section-title">
          <span class="title-icon"></span>
          <h3>CAREER OBJECTIVE</h3>
        </div>
        <div class="content-box">
          <p id="previewSummary"></p>
        </div>
      </section>

      <!-- EDUCATION -->
      <section class="main-section card-content" id="educationSection">
        <div class="section-title">
          <span class="title-icon"></span>
          <h3>EDUCATION</h3>
        </div>
        <div class="content-box">
          <div class="edu-item">
            <div class="edu-header">
              <strong id="previewDegree"></strong>
              <span class="edu-field" id="previewField"></span>
            </div>
            <div class="edu-details">
              <span id="previewEduInstitute"></span>
              <span class="separator">|</span>
              <span id="previewEduLocation"></span>
            </div>
            <div class="edu-date">
              <span id="previewGraduation"></span>
            </div>
            <ul id="previewEduDetails" class="edu-achievements"></ul>
          </div>
        </div>
      </section>

      <!-- EXPERIENCE -->
      <section class="main-section card-content hide-section" id="previewExperienceSection">
        <div class="section-title">
          <span class="title-icon"></span>
          <h3>WORK EXPERIENCE</h3>
        </div>
        <div class="content-box">
          <div id="previewExperienceList" class="experience-list"></div>
        </div>
      </section>

    </main>

  </div>
</div>
