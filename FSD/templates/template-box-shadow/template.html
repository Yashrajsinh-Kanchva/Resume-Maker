<div class="resume box-shadow" style="width:800px;min-height:1100px;background:#f5f5f5;">

  <header class="top-header" style="background:#ff8f00;color:#1a1a1a;">
    <h1 id="previewName">Resume</h1>
    <p id="previewTitle"></p>
  </header>

  <div class="body">

    <aside class="left-panel" style="background:#fff;">
      <div class="profile-icon">
        <svg width="130" height="130" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="65" cy="65" r="65" fill="url(#boxGrad1)"/>
          <circle cx="65" cy="48" r="22" fill="#fff" opacity="0.95"/>
          <path d="M28 100 C28 80, 45 70, 65 70 C85 70, 102 80, 102 100" fill="#fff" opacity="0.95"/>
          <defs>
            <linearGradient id="boxGrad1" x1="0" y1="0" x2="130" y2="130" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#ff8f00"/>
              <stop offset="100%" stop-color="#ffa726"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <section class="side-section">
        <h3>CONTACT</h3>
        <p id="previewEmail"></p>
        <p id="previewPhone"></p>
        <p id="previewLocation"></p>
      </section>


      <section class="side-section">
        <h3>CERTIFICATIONS</h3>
        <ul id="pCerts"></ul>
      </section>

      <section class="side-section">
        <h3>LANGUAGES</h3>
        <ul id="pLanguages"></ul>
      </section>


    </aside>

    <main class="right-panel">

      <section class="main-section">
        <h3>PROFILE</h3>
        <p id="previewSummary"></p>
      </section>

      <section class="main-section" id="skillsSection">
        <h3>SKILLS</h3>
        <ul id="previewSkills"></ul>
      </section>

      <section class="main-section" id="educationSection">
        <h3>EDUCATION</h3>

        <p>
          <strong id="previewDegree"></strong><br>
          <span id="previewField"></span><br>
          <span id="previewEduInstitute"></span>,
          <span id="previewEduLocation"></span><br>
          <span id="previewGraduation"></span>
        </p>

        <ul id="previewEduDetails"></ul>
      </section>
      <section class="main-section" id="previewExperienceSection" style="display:none">
        <h3>WORK EXPERIENCE</h3>

        <div id="previewExperienceList">
          <p>
            <strong id="previewExpTitle"></strong><br>
            <span id="previewExpCompany"></span><br>
            <span id="previewExpLocation"></span><br>
            <span id="previewExpDuration"></span>
          </p>

          <ul id="previewExpDesc"></ul>
        </div>
      </section>


    </main>
  </div>
</div>
