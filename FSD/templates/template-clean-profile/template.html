<div class="resume clean-profile" style="width:800px;min-height:1100px;">

  <!-- LEFT COLUMN -->
  <aside class="left">
    <div class="profile-icon">
      <svg width="140" height="140" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="70" cy="70" r="70" fill="url(#profileGrad1)"/>
        <circle cx="70" cy="52" r="24" fill="#fff" opacity="0.95"/>
        <path d="M35 105 C35 82, 52 72, 70 72 C88 72, 105 82, 105 105" fill="#fff" opacity="0.95"/>
        <defs>
          <linearGradient id="profileGrad1" x1="0" y1="0" x2="140" y2="140" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#4a90e2"/>
            <stop offset="100%" stop-color="#357abd"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <section class="block">
      <h3>CONTACT</h3>
      <p id="previewPhone"></p>
      <p id="previewEmail"></p>
      <p id="previewLocation"></p>
    </section>

    <section class="block">
      <h3>LANGUAGES</h3>
      <ul id="pLanguages"></ul>
    </section>

    <section class="block">
      <h3>CERTIFICATES</h3>
      <ul id="pCerts"></ul>
    </section>

  </aside>

  <!-- RIGHT COLUMN -->
  <main class="right">
    <header class="header">
      <h1 id="previewName">Resume</h1>
      <h2 id="previewTitle">Title</h2>
    </header>

    <section class="section">
      <h3>SUMMARY</h3>
      <p id="previewSummary"></p>
    </section>

    <section id="educationSection" class="section">
      <h3>EDUCATION</h3>

      <p>
        <strong id="previewDegree"></strong><br>
        <span id="previewField"></span><br>
        <span id="previewEduInstitute"></span>,
        <span id="previewEduLocation"></span><br>
        <span id="previewGraduation"></span>
      </p>

      <ul id="previewEduDetails"></ul>
    </section>

    <section id="previewExperienceSection" class="section" style="display:none">
      <h3>EXPERIENCE</h3>
      <div id="previewExperienceList"></div>
    </section>

<!--    <section class="section">-->
<!--      <h3>PROJECTS</h3>-->
<!--      <div id="previewProjects"></div>-->
<!--    </section>-->


    <section class="section" id="skillsSection">
      <h3>SKILLS</h3>
      <ul id="previewSkills"></ul>
    </section>
  </main>

</div>
