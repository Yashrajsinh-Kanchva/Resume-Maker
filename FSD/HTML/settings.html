<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Maker | Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

  <link rel="stylesheet" href="../CSS/navbar.css">
  <link rel="stylesheet" href="../CSS/settings.css">

  <script type="module" src="../JS/navbar-loader.js"></script>

</head>
<body>

<div id="navbar-container"></div>

<main class="settings-main mt-5 pt-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-xl-7">
        
        <!-- Page Header -->
        <div class="page-header mb-4">
          <h2 class="text-white mb-2">
            <i class="bi bi-gear-fill me-2 text-green"></i>Settings
          </h2>
          <p class="text-muted">Manage your account settings and profile information</p>
        </div>

        <!-- Profile Card -->
        <div class="settings-card">
          <div class="card-header-custom">
            <h4 class="mb-0">
              <i class="bi bi-person-circle me-2"></i>Edit Profile
            </h4>
          </div>

          <div class="card-body-custom">
            <form id="profileForm">
              <!-- Name Field -->
              <div class="mb-4">
                <label for="userName" class="form-label text-white mb-2">
                  <i class="bi bi-person me-2"></i>Full Name
                </label>
                <input 
                  type="text" 
                  id="userName" 
                  name="name" 
                  class="form-control dark-input" 
                  placeholder="Enter your full name"
                  required>
                <small class="text-muted">This name will be displayed across the application</small>
              </div>

              <!-- Email Field (Read-only) -->
              <div class="mb-4">
                <label for="userEmail" class="form-label text-white mb-2">
                  <i class="bi bi-envelope me-2"></i>Email Address
                </label>
                <input 
                  type="email" 
                  id="userEmail" 
                  name="email" 
                  class="form-control dark-input" 
                  readonly
                  disabled>
                <small class="text-muted">Email cannot be changed</small>
              </div>

              <!-- Provider Info -->
              <div class="mb-4">
                <div class="form-label text-white mb-2">
                  <i class="bi bi-shield-check me-2"></i>Account Type
                </div>
                <div class="provider-badge" id="providerBadge">
                  <i class="bi bi-person me-2"></i><span id="providerText">Local Account</span>
                </div>
                <small class="text-muted">Your account authentication method</small>
              </div>

              <!-- Action Buttons -->
              <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top border-secondary">
                <button type="button" class="btn btn-secondary" onclick="window.location.href='documents.html'">
                  <i class="bi bi-x-lg me-2"></i>Cancel
                </button>
                <button type="submit" class="btn btn-primary" id="saveBtn">
                  <i class="bi bi-check-lg me-2"></i>Save Changes
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Success/Error Messages -->
        <div id="messageAlert" class="alert alert-dismissible fade" role="alert" style="display: none;">
          <span id="messageText"></span>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>

      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="../JS/settings.js"></script>

</body>
</html>
