<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resume Maker | Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="../CSS/signUp.css">

</head>
<body class="dark-mode">

    <div class="glow-bg"></div>

    <div class="main-container shadow-glow">

        <div class="left-panel">
            <h1>WELCOME</h1>
            <h4>CREATE YOUR ACCOUNT</h4>

            <p class="welcome-text text-light-gray">
                Join Resume Maker today and build a job-ready resume
                in just a few minutes.
            </p>

            <div class="circle c1"></div>
            <div class="circle c2"></div>
            <div class="circle c3"></div>
        </div>

        <div class="right-panel">

            <h2 class="text-white mb-4">Create Your Account</h2>

            <div id="messageBox"></div>

            <form id="signupForm">

                <label class="fw-bold small text-green">FULL NAME</label>
                <input 
                    type="text" 
                    id="signupName"
                    name="name" 
                    class="form-control mb-3 dark-input" 
                    placeholder="Your Full Name" 
                    required
                >

                <label class="fw-bold small text-green">EMAIL ADDRESS</label>
                <input 
                    type="email" 
                    id="signupEmail"
                    name="email" 
                    class="form-control mb-3 dark-input" 
                    placeholder="yourname@gmail.com" 
                    required
                >

                <label class="fw-bold small text-green">PASSWORD</label>
                <div class="position-relative mb-3">
                    <input
                        type="password"
                        id="signupPassword"
                        name="password"
                        class="form-control dark-input"
                        placeholder="Password"
                        required
                    >

                    <span class="show-password text-green" onclick="togglePassword('signupPassword', this)">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                </div>

                <label class="fw-bold small text-green">CONFIRM PASSWORD</label>
                <div class="position-relative mb-3">
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirm_password"
                        class="form-control dark-input"
                        placeholder="Confirm Password"
                        required
                    >

                    <span class="show-password text-green" onclick="togglePassword('confirmPassword', this)">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                </div>

                <div class="d-flex align-items-center mb-3 text-light-gray">
                    <input 
                        type="checkbox" 
                        id="termsCheckbox"
                        class="form-check-input me-2 bg-dark border-secondary" 
                        required
                    >
                    <span class="small">I agree to the <a href="terms.html" class="text-green fw-bold text-decoration-none">Terms & Conditions</a></span>
                </div>

                <button type="submit" id="signupBtn" class="login-btn shadow-glow w-100">
                    Sign Up
                </button>

                <div class="divider my-4 text-light-gray">or</div>

                <p class="text-center small text-light-gray">
                    Already have an account?
                    <a href="loginPage.html" class="text-green fw-bold text-decoration-none">Login</a>
                </p>
            </form>

        </div>
    </div>

    <script src="../JS/showPassword.js"></script>

    <script>
    document.getElementById("signupForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const formData = new FormData(this);
        const messageBox = document.getElementById("messageBox");
        const signupBtn = document.getElementById("signupBtn");
        const password = document.getElementById("signupPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        // Clear previous messages
        messageBox.innerHTML = "";

        // Validate passwords match
        if (password !== confirmPassword) {
            messageBox.innerHTML = `
                <div class="alert alert-danger border-0 bg-danger-subtle text-danger">
                    Passwords do not match. Please try again.
                </div>
            `;
            return;
        }

        // Validate password length
        if (password.length < 8) {
            messageBox.innerHTML = `
                <div class="alert alert-danger border-0 bg-danger-subtle text-danger">
                    Password must be at least 8 characters long.
                </div>
            `;
            return;
        }

        // Show loading state
        const originalBtnText = signupBtn.innerHTML;
        signupBtn.disabled = true;
        signupBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Creating Account...';

        try {
            // Use relative URL for production compatibility
            const response = await fetch("/api/users/signup", {
                method: "POST",
                body: formData,
                credentials: "include"
            });

            const data = await response.json();

            if (data.success) {
                messageBox.innerHTML = `
                    <div class="alert alert-success border-0 bg-success-subtle text-success">
                        <i class="fa-solid fa-check-circle me-2"></i>
                        ${data.message || "Account created successfully!"}
                    </div>
                `;

                // Redirect to login page after successful signup
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);

            } else {
                messageBox.innerHTML = `
                    <div class="alert alert-danger border-0 bg-danger-subtle text-danger">
                        <i class="fa-solid fa-exclamation-circle me-2"></i>
                        ${data.message || "Failed to create account. Please try again."}
                    </div>
                `;
                signupBtn.disabled = false;
                signupBtn.innerHTML = originalBtnText;
            }

        } catch (error) {
            console.error("Signup error:", error);
            messageBox.innerHTML = `
                <div class="alert alert-danger border-0 bg-danger-subtle text-danger">
                    <i class="fa-solid fa-exclamation-circle me-2"></i>
                    An error occurred. Please check your connection and try again.
                </div>
            `;
            signupBtn.disabled = false;
            signupBtn.innerHTML = originalBtnText;
        }
    });
    </script>

</body>
</html>
