<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Maker | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

    <link rel="stylesheet" href="../CSS/loginPage.css">

    <script>
        function loginWithGoogle() {
            globalThis.location.href = "http://localhost:5000/api/auth/google/login";
        }
    </script>
</head>

<body class="dark-mode">

    <div class="glow-bg"></div>

    <div class="main-container shadow-glow">

        <div class="left-panel">
            <h1>WELCOME</h1>
            <h4>BUILD YOUR PROFESSIONAL RESUME</h4>

            <p class="welcome-text text-light-gray">
                Create beautiful, ATS-friendly resumes quickly.
                Customize, edit, and download your job-ready resume instantly.
            </p>

            <div class="left-deco" aria-hidden="true">
                <div class="deco-blob blob-1"></div>
                <div class="deco-blob blob-2"></div>
                <div class="deco-blob blob-3"></div>
            </div>
        </div>

        <div class="right-panel">

            <h2 class="text-white mb-4">Sign in to your Account</h2>

            <div id="messageBox"></div>

            <form id="loginForm">

                <label for="loginEmail" class="fw-bold small text-green">EMAIL ADDRESS</label>
                <input
                    id="loginEmail"
                    type="email"
                    name="email"
                    class="form-control mb-3 dark-input"
                    placeholder="Email Address"
                    required
                >

                <label for="loginPassword" class="fw-bold small text-green">PASSWORD</label>
                <div class="position-relative mb-2">
                    <input
                        type="password"
                        id="loginPassword"
                        name="password"
                        class="form-control dark-input"
                        placeholder="Password"
                        required
                    >
                    <button
                        type="button"
                        class="show-password text-green"
                        onclick="togglePassword('loginPassword', this)"
                        aria-label="Toggle password visibility"
                    >
                        <i class="fa-solid fa-eye" aria-hidden="true"></i>
                    </button>
                </div>

                <div class="d-flex justify-content-between mb-4 small">
                    <a href="forgot-password.html" class="text-light-gray hover-green text-decoration-none">
                        Forgot your password?
                    </a>
                </div>

                <button type="submit" class="login-btn w-100 shadow-glow">
                    Log in
                </button>

                <div class="divider my-4 text-light-gray">or</div>

                <p class="text-center small text-light-gray">
                    Don't have an account?
                    <a href="signUp.html" class="text-green fw-bold text-decoration-none">Sign up</a>
                </p>

                <button
                    type="button"
                    class="social-btn google-btn w-100"
                    onclick="loginWithGoogle()"
                >
                    <img
                        src="https://cdn-icons-png.flaticon.com/512/300/300221.png"
                        alt="Google"
                        width="18"
                    >
                    Sign in with Google
                </button>

            </form>
        </div>
    </div>

    <script src="../JS/showPassword.js"></script>

    <script>
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const formData = new FormData(this);
        const messageBox = document.getElementById("messageBox");

        messageBox.innerHTML = "";

        try {
            const response = await fetch("http://localhost:5000/api/users/login", {
                method: "POST",
                body: formData,
                credentials: "include"   // 🔥 REQUIRED FOR SESSION
            });

            const data = await response.json();

            if (data.success) {
                messageBox.innerHTML = `
                    <div class="alert alert-success border-0 bg-success-subtle text-success">
                        ${data.message || "Login successful"}
                    </div>
                `;

                // ✅ Redirect to Flask dashboard
                setTimeout(() => {
                    globalThis.location.href = "http://localhost:5000/dashboard";
                }, 1000);

            } else {
                messageBox.innerHTML = `
                    <div class="alert alert-danger border-0 bg-danger-subtle text-danger">
                        ${data.message || "Invalid email or password"}
                    </div>
                `;
            }

        } catch (error) {
            console.error("Frontend error:", error);
            messageBox.innerHTML = `
                <div class="alert alert-danger border-0 bg-danger-subtle text-danger">
                    Frontend error. Check console.
                </div>
            `;
        }
    });
    </script>

</body>
</html>
