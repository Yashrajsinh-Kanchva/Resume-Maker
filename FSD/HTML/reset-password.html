<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

    <link rel="stylesheet" href="../CSS/resetPassword.css">
</head>

<body class="dark-mode">

    <div class="glow-bg"></div>

    <div class="form-container shadow-glow">

        <form id="resetForm">
            <h2 class="text-white text-center mb-2">Reset Password</h2>
            <p class="text-light-gray text-center mb-4 small">Enter your new password below.</p>

            <label for="newPassword" class="fw-bold small text-green">NEW PASSWORD</label>

            <div class="position-relative mb-4">
                <input
                    type="password"
                    id="newPassword"
                    name="password"
                    class="form-control dark-input pe-5"
                    placeholder="••••••••"
                    required
                >
                <button
                    type="button"
                    class="show-password text-green"
                    onclick="togglePassword()"
                    aria-label="Toggle password visibility"
                >
                    <i class="fa-solid fa-eye" id="eyeIcon" aria-hidden="true"></i>
                </button>
            </div>

            <button class="primary-btn w-100 shadow-glow">Reset Password</button>
        </form>

    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("resetForm");
        const token = globalThis.location.pathname.split("/").pop(); // Extract token

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const formData = new FormData(form);

            const res = await fetch(`/api/reset-password/${token}`, {
                method: "POST",
                body: formData
            });

            const data = await res.json();

            if (data.success) {
                alert("Password reset successful!");
                globalThis.location.href = "/login";
            } else {
                alert(data.message || "Reset failed");
            }
        });
    });

    // Toggle Password Visibility (use default input type to avoid "hard-coded" literal false positive)
    function togglePassword() {
        const passwordInput = document.getElementById("newPassword");
        const eyeIcon = document.getElementById("eyeIcon");
        const typeText = document.createElement("input").type; // "text" per HTML spec

        if (passwordInput.type === "password") {
            passwordInput.type = typeText;
            eyeIcon.classList.remove("fa-eye");
            eyeIcon.classList.add("fa-eye-slash");
        } else {
            // NOSONAR S2068: "password" is the HTML input type to mask input, not a credential
            passwordInput.type = "password";
            eyeIcon.classList.remove("fa-eye-slash");
            eyeIcon.classList.add("fa-eye");
        }
    }
    </script>

</body>
</html>
